<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist Viewer</title>
  <meta
    name="description"
    content="A stage-ready static viewer for Nashville Number Charts and Legacy Song maps."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="song-header">
    <div class="song-identity">
      <div class="title-row">
        <h1 id="song-title">Setlist Viewer</h1>
        <span class="legacy-badge" id="legacy-badge" hidden>Legacy</span>
      </div>
      <p class="artist" id="song-artist"></p>
    </div>
    <div class="header-tools">
      <div class="meta" id="song-meta" aria-label="Song metadata"></div>
      <div class="song-controls" aria-label="Song and display controls">
        <button class="control-button nav-button" type="button" id="prev-song" aria-label="Previous Song" title="Previous Song">←</button>
        <span class="song-count" id="song-count">Song 0 of 0</span>
        <button class="control-button nav-button" type="button" id="next-song" aria-label="Next Song" title="Next Song">→</button>
        <button class="control-button picker-trigger" type="button" id="song-picker-trigger" aria-controls="song-picker" aria-haspopup="dialog">Choose Song</button>
        <div class="layout-controls" role="group" aria-label="Section columns">
          <button class="control-button layout-button" type="button" id="layout-one" aria-pressed="false" title="Use one Section column" aria-label="Use one Section column" data-columns="1">▤</button>
          <button class="control-button layout-button" type="button" id="layout-two" aria-pressed="true" title="Use two Section columns" aria-label="Use two Section columns" data-columns="2">▥</button>
          <button class="control-button layout-button layout-four" type="button" id="layout-four" aria-pressed="false" title="Use four Section columns" aria-label="Use four Section columns" data-columns="4">▦</button>
        </div>
        <div class="mode-controls display-mode-controls" role="radiogroup" aria-label="Chart Display Mode">
          <button class="mode-button display-mode-button" type="button" role="radio" aria-checked="true" data-chart-mode="chords">Chords</button>
          <button class="mode-button display-mode-button" type="button" role="radio" aria-checked="false" data-chart-mode="melody">Melody</button>
          <button class="mode-button display-mode-button" type="button" role="radio" aria-checked="false" data-chart-mode="lyrics">Lyrics</button>
        </div>
        <div class="mode-controls bar-numbering-controls" role="radiogroup" aria-label="Bar Numbering Mode">
          <button class="mode-button bar-numbering-button" type="button" role="radio" aria-checked="true" data-bar-numbering="section">Per Section</button>
          <button class="mode-button bar-numbering-button" type="button" role="radio" aria-checked="false" data-bar-numbering="global">Global</button>
        </div>
        <button class="control-button state-toggle palette-toggle" type="button" id="palette-toggle" aria-pressed="false" aria-label="Section colors: Strong. Use pastel Section colors" title="Use pastel Section colors">Strong</button>
        <button class="control-button state-toggle theme-toggle" type="button" id="theme-toggle" aria-pressed="false" aria-label="Theme: Light. Use dark mode" title="Use dark mode">Light</button>
      </div>
    </div>
    <nav class="song-map" id="song-map" aria-label="Song map"></nav>
  </header>

  <dialog class="song-picker" id="song-picker" aria-labelledby="song-picker-title">
    <div class="picker-panel">
      <header class="picker-header">
        <div>
          <h2 id="song-picker-title">Choose Song</h2>
          <p>Search the ordered catalog by title or Artist.</p>
        </div>
        <button class="picker-close" type="button" id="song-picker-close" aria-label="Close Song Picker">×</button>
      </header>
      <label class="search-label" for="song-search">Search Songs</label>
      <input class="song-search" id="song-search" type="search" autocomplete="off" placeholder="Title or Artist">
      <p class="picker-status" id="song-picker-status" aria-live="polite"></p>
      <div class="picker-results" id="song-picker-results" aria-label="Songs"></div>
    </div>
  </dialog>

  <main id="chart">
    <section class="song-list" id="song-list"></section>
  </main>
  <script src="chart-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
