<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist Viewer</title>
  <meta
    name="description"
    content="A stage-ready static viewer for Nashville Number Charts and Legacy Song maps."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="song-header">
    <div class="song-identity">
      <div class="title-row">
        <h1 id="song-title">Setlist Viewer</h1>
        <span class="legacy-badge" id="legacy-badge" hidden>Legacy</span>
      </div>
      <p class="artist" id="song-artist"></p>
    </div>
    <div class="header-tools">
      <div class="meta" id="song-meta" aria-label="Song metadata"></div>
      <div class="song-controls" aria-label="Song and display controls">
        <button class="control-button nav-button" type="button" id="prev-song" aria-label="Previous Song" title="Previous Song">←</button>
        <span class="song-count" id="song-count">Song 0 of 0</span>
        <button class="control-button nav-button" type="button" id="next-song" aria-label="Next Song" title="Next Song">→</button>
        <div class="layout-controls" role="group" aria-label="Section columns">
          <button class="control-button layout-button" type="button" id="layout-one" aria-pressed="false" title="Use one Section column" aria-label="Use one Section column" data-columns="1">▤</button>
          <button class="control-button layout-button" type="button" id="layout-two" aria-pressed="true" title="Use two Section columns" aria-label="Use two Section columns" data-columns="2">▥</button>
          <button class="control-button layout-button layout-four" type="button" id="layout-four" aria-pressed="false" title="Use four Section columns" aria-label="Use four Section columns" data-columns="4">▦</button>
        </div>
        <button class="control-button melody-toggle" type="button" id="melody-toggle" aria-pressed="true" aria-label="Hide melody" title="Hide melody">♫</button>
        <button class="control-button palette-toggle" type="button" id="palette-toggle" aria-pressed="false" aria-label="Use pastel Section colors" title="Use pastel Section colors">●</button>
        <button class="control-button theme-toggle" type="button" id="theme-toggle" aria-pressed="false" aria-label="Use dark mode" title="Use dark mode">☾</button>
      </div>
    </div>
    <nav class="song-map" id="song-map" aria-label="Song map"></nav>
    <div class="directory-strip" aria-label="Quick Song Directory">
      <span class="directory-label">Songs</span>
      <div class="song-directory" id="song-directory"></div>
    </div>
  </header>

  <main id="chart">
    <section class="song-list" id="song-list"></section>
  </main>
  <script src="chart-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
