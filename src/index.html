<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist Viewer</title>
  <meta
    name="description"
    content="A static setlist viewer for rehearsals and live services with song-by-song maps, quick navigation, and theme toggle."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Static Project / Reusable Viewer</p>
      <h1>Setlist Viewer</h1>
      <p>
        A browser-based setlist reference for rehearsals and live use. Each song shows the title,
        BPM, key, lead vocalist, notes, and a fully expanded section map with consistent color coding.
      </p>
      <div class="nav-panel">
        <div class="slide-controls">
          <button class="nav-button" type="button" id="prev-song">Previous Song</button>
          <div class="song-count" id="song-count">Song 1 of 1</div>
          <button class="nav-button" type="button" id="next-song">Next Song</button>
          <button class="nav-button theme-toggle" type="button" id="theme-toggle">Dark Mode</button>
        </div>
        <p class="directory-label">Quick Song Directory</p>
        <div class="song-directory" id="song-directory"></div>
      </div>
    </section>

    <section class="song-list" id="song-list"></section>
  </main>
  <script src="song-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
