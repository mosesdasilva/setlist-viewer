<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Chart Prototype — Setlist Viewer</title>
  <!-- Three throwaway responsive chart variants, switchable via ?variant=, using the representative chart. -->
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f2f3;
      --paper: #fff;
      --ink: #111;
      --muted: #666;
      --line: #c9cdd1;
      --soft-line: #e3e5e7;
      --intro: #cbd5e1;
      --verse: #93c5fd;
      --tag: #fdba74;
      --prechorus: #fde68a;
      --chorus: #86efac;
      --instrumental: #c4b5fd;
      --bridge: #fca5a5;
      --ending: #d1d5db;
      --melody: #b91c1c;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-variant-numeric: tabular-nums;
    }

    button { font: inherit; }
    .prototype-warning {
      padding: 8px 16px;
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
    }

    .song-header {
      position: sticky;
      z-index: 5;
      top: 0;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 16px max(12px, calc((100vw - 1120px) / 2));
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
    }

    .song-header h1 { margin: 0; font-size: clamp(22px, 4vw, 38px); letter-spacing: -.04em; }
    .artist { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    .meta { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
    .meta span { padding: 7px 9px; border: 1px solid var(--line); border-radius: 999px; background: #fff; font-weight: 800; }

    #chart { width: min(1120px, calc(100% - 24px)); margin: 18px auto 110px; }
    .chart-intro { margin: 0 0 14px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .section { --section-color: var(--ending); }
    .section[data-code="IN"] { --section-color: var(--intro); }
    .section[data-code="VS"] { --section-color: var(--verse); }
    .section[data-code="TG"] { --section-color: var(--tag); }
    .section[data-code="PC"] { --section-color: var(--prechorus); }
    .section[data-code="CH"] { --section-color: var(--chorus); }
    .section[data-code="IS"] { --section-color: var(--instrumental); }
    .section[data-code="BR"] { --section-color: var(--bridge); }

    .chart-row { min-width: 0; }
    .bars-and-notes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(92px, 1.45fr);
      min-width: 0;
    }

    .bar {
      display: flex;
      min-width: 0;
      min-height: 58px;
      align-items: center;
      justify-content: space-evenly;
      border-right: 1px solid var(--line);
      font-size: clamp(19px, 3.2vw, 31px);
      font-weight: 850;
      letter-spacing: -.04em;
    }

    .bar:first-child { border-left: 1px solid var(--line); }
    .event { position: relative; display: inline-grid; place-items: center; min-width: 0; }
    .event[data-beats]::before {
      position: absolute;
      bottom: calc(100% + 1px);
      content: attr(data-beats);
      font-size: 8px;
      letter-spacing: 1px;
    }
    .diamond { width: 31px; height: 31px; border: 2px solid currentColor; transform: rotate(45deg); }
    .diamond span { transform: rotate(-45deg); }
    .empty { color: transparent; }

    .row-notes {
      display: grid;
      min-width: 0;
      align-content: center;
      gap: 4px;
      padding: 6px 8px;
      overflow: hidden;
      color: #383838;
      font-size: clamp(9px, 1.7vw, 13px);
      line-height: 1.15;
    }
    .direction { font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
    .melody { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); color: var(--melody); font-weight: 800; }
    .melody span { min-width: 0; padding: 2px; border-right: 1px solid currentColor; overflow: hidden; text-align: center; text-overflow: clip; white-space: nowrap; }
    .melody span:last-child { border-right: 0; }
    .no-note { color: #aaa; }

    /* A — Bands: full-name headers and generous, separate Section cards. */
    .variant-a .section { margin: 0 0 14px; overflow: hidden; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper); }
    .variant-a .section-heading { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--section-color); }
    .variant-a .section-heading h2 { margin: 0; font-size: 15px; }
    .variant-a .section-code { padding: 3px 6px; border: 1px solid rgba(0,0,0,.25); border-radius: 6px; font-size: 10px; font-weight: 900; }
    .variant-a .chart-row + .chart-row { border-top: 1px solid var(--soft-line); }
    .variant-a .row-notes { background: #f8f8f8; }

    /* B — Rail: compact colored Section rail beside each Section's row stack. */
    .variant-b { display: grid; gap: 9px; }
    .variant-b .chart-intro { grid-column: 1 / -1; }
    .variant-b .section { display: grid; grid-template-columns: clamp(48px, 9vw, 104px) minmax(0, 1fr); overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); }
    .variant-b .section-heading { display: grid; place-content: center; gap: 4px; padding: 7px 4px; background: var(--section-color); text-align: center; }
    .variant-b .section-heading h2 { margin: 0; font-size: clamp(10px, 1.6vw, 14px); }
    .variant-b .section-code { order: -1; font-size: 18px; font-weight: 950; }
    .variant-b .chart-row + .chart-row { border-top: 1px solid var(--soft-line); }
    .variant-b .row-notes { border-left: 3px solid var(--section-color); }

    /* C — Ledger: one continuous performance table, Section identity repeated per row. */
    .variant-c { width: min(1240px, calc(100% - 12px)) !important; border: 1px solid #777; background: var(--paper); }
    .variant-c .chart-intro { margin: 0; padding: 10px; border-bottom: 2px solid #111; background: #eee; }
    .variant-c .section { display: contents; }
    .variant-c .section-heading { display: none; }
    .variant-c .section-rows { display: contents; }
    .variant-c .chart-row { display: grid; grid-template-columns: clamp(44px, 8vw, 92px) minmax(0, 1fr); border-top: 1px solid var(--line); }
    .variant-c .chart-row.first-row { border-top: 4px solid var(--section-color); }
    .variant-c .ledger-label { display: grid; place-content: center; padding: 4px; background: color-mix(in srgb, var(--section-color), white 20%); text-align: center; }
    .variant-c .ledger-label strong { font-size: clamp(11px, 1.6vw, 14px); }
    .variant-c .ledger-label small { font-size: 9px; font-weight: 900; }
    .variant-c .row-notes { border-left: 1px solid var(--line); background: #f7f7f7; }

    .switcher {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(430px, calc(100% - 24px));
      padding: 8px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: #111;
      box-shadow: 0 12px 34px rgba(0,0,0,.34);
      color: #fff;
      transform: translateX(-50%);
    }
    .switcher button { width: 42px; height: 38px; border: 0; border-radius: 999px; background: #fff; color: #111; cursor: pointer; font-size: 20px; font-weight: 900; }
    .switcher-output { flex: 1; min-width: 0; text-align: center; }
    .switcher-output strong, .switcher-output small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .switcher-output small { margin-top: 2px; color: #bbb; font-size: 10px; }
    .switcher[hidden] { display: none; }

    @media (max-width: 520px) {
      .song-header { align-items: start; padding: 10px 12px; }
      .artist { font-size: 12px; }
      .meta { max-width: 135px; gap: 4px; }
      .meta span { padding: 5px 7px; font-size: 10px; }
      #chart { width: calc(100% - 12px); margin-top: 8px; }
      .chart-intro { padding-inline: 4px; font-size: 11px; }
      .bars-and-notes { grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(78px, 1.25fr); }
      .bar { min-height: 49px; font-size: 18px; }
      .row-notes { padding: 4px; font-size: 8px; }
      .variant-a .section { margin-bottom: 8px; border-radius: 9px; }
      .variant-a .section-heading { padding: 6px 8px; }
      .variant-b .section { grid-template-columns: 46px minmax(0, 1fr); }
      .variant-b .section-heading h2 { display: none; }
      .variant-c .chart-row { grid-template-columns: 42px minmax(0, 1fr); }
      .variant-c .ledger-label strong { display: none; }
    }
  </style>
</head>
<body>
  <div class="prototype-warning">Throwaway prototype · responsive chart presentation</div>
  <header class="song-header">
    <div>
      <h1>Más</h1>
      <p class="artist">Miel San Marcos</p>
    </div>
    <div class="meta" aria-label="Song metadata">
      <span>Key D</span><span>140 BPM</span><span>4/4</span>
    </div>
  </header>
  <main id="chart"></main>
  <nav class="switcher" id="switcher" aria-label="Prototype variant switcher">
    <button type="button" id="previous-variant" aria-label="Previous variant">←</button>
    <div class="switcher-output" aria-live="polite">
      <strong id="variant-label"></strong>
      <small>Arrow keys switch · URL stays shareable</small>
    </div>
    <button type="button" id="next-variant" aria-label="Next variant">→</button>
  </nav>

  <script>
    (function () {
      const melodyA = ["17 65", "32 12", "17 65", "5156 5"];
      const melodyB = ["6 3", "6 –", "6 3", "7 –"];
      const melodyC = ["656 3", "656 3", "656 3", "7"];
      const melodyD = ["265 61", "3323 1265", "265 61", "3323 3511"];
      const common = [["4", "2", "6", "3"], ["4", "2", "6", "3"]];
      const bridge = [["4", "5", "6", "1/3"], ["4", "5", "6", "1/3"]];

      const sections = [
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, [{ type: "direction", text: "Rakes", row: 0 }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, []],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IS", "Instrumental", [["6", "6", "6", "6"], ["6", "6", "6", "6"]], [{ type: "melody", fragments: melodyD }, { type: "melody", fragments: melodyD }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["TG", "Tag", bridge, []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["EN", "Ending", [["234", "671", { text: "3", diamond: true }, ""]], []]
      ].map(function (section, index) {
        return { code: section[0], name: section[1], rows: section[2], notes: section[3], occurrence: index + 1 };
      });

      const variants = [
        { key: "A", slug: "bands", name: "Section Bands" },
        { key: "B", slug: "rail", name: "Compact Section Rail" },
        { key: "C", slug: "ledger", name: "Continuous Ledger" }
      ];
      const chart = document.getElementById("chart");
      const switcher = document.getElementById("switcher");
      const variantLabel = document.getElementById("variant-label");

      function renderEvent(value) {
        const event = typeof value === "object" ? value : { text: value };
        if (!event.text) return '<span class="event empty">—</span>';
        if (event.diamond) return '<span class="event diamond"><span>' + event.text + '</span></span>';
        return '<span class="event">' + event.text + '</span>';
      }

      function renderNotes(section, rowIndex) {
        const notes = section.notes.filter(function (note, noteIndex) {
          return (note.row === undefined ? noteIndex : note.row) === rowIndex;
        });
        if (!notes.length) return '<span class="no-note">&nbsp;</span>';
        return notes.map(function (note) {
          if (note.type === "direction") return '<span class="direction">' + note.text + '</span>';
          return '<span class="melody">' + note.fragments.map(function (fragment) { return '<span>' + fragment + '</span>'; }).join("") + '</span>';
        }).join("");
      }

      function renderSection(section, variant) {
        const rows = section.rows.map(function (bars, rowIndex) {
          const ledgerLabel = variant.key === "C"
            ? '<div class="ledger-label"><strong>' + section.name + '</strong><small>' + section.code + '</small></div>'
            : "";
          return '<div class="chart-row ' + (rowIndex === 0 ? "first-row" : "") + '">' + ledgerLabel +
            '<div class="bars-and-notes"><div class="bar">' + renderEvent(bars[0]) + '</div><div class="bar">' + renderEvent(bars[1]) +
            '</div><div class="bar">' + renderEvent(bars[2]) + '</div><div class="bar">' + renderEvent(bars[3]) +
            '</div><aside class="row-notes" aria-label="Row notes">' + renderNotes(section, rowIndex) + '</aside></div></div>';
        }).join("");
        return '<section class="section" data-code="' + section.code + '"><header class="section-heading"><h2>' + section.name +
          '</h2><span class="section-code">' + section.code + '</span></header><div class="section-rows">' + rows + '</div></section>';
      }

      function activeVariant() {
        const requested = new URLSearchParams(location.search).get("variant");
        return variants.find(function (variant) { return variant.key.toLowerCase() === String(requested).toLowerCase() || variant.slug === requested; }) || variants[0];
      }

      function render() {
        const variant = activeVariant();
        chart.className = "variant-" + variant.key.toLowerCase();
        chart.innerHTML = '<p class="chart-intro">Expanded Arrangement · all repeated Sections shown · four Bars and side-by-side Row Notes preserved at every width.</p>' +
          sections.map(function (section) { return renderSection(section, variant); }).join("");
        variantLabel.textContent = variant.key + " — " + variant.name;
        document.title = variant.key + " — " + variant.name + " · Responsive Chart Prototype";
      }

      function cycle(direction) {
        const current = variants.findIndex(function (variant) { return variant.key === activeVariant().key; });
        const next = variants[(current + direction + variants.length) % variants.length];
        const url = new URL(location.href);
        url.searchParams.set("variant", next.key);
        history.replaceState({}, "", url);
        render();
      }

      document.getElementById("previous-variant").addEventListener("click", function () { cycle(-1); });
      document.getElementById("next-variant").addEventListener("click", function () { cycle(1); });
      document.addEventListener("keydown", function (event) {
        const target = event.target;
        if (target && (target.matches("input, textarea, select") || target.isContentEditable)) return;
        if (event.key === "ArrowLeft") cycle(-1);
        if (event.key === "ArrowRight") cycle(1);
      });
      window.addEventListener("popstate", render);

      const isPrototypeEnvironment = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
      switcher.hidden = !isPrototypeEnvironment;
      render();
    })();
  </script>
</body>
</html>
