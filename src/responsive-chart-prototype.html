<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Bands Prototype — Setlist Viewer</title>
  <!-- Throwaway refinement of the chosen Section Bands direction. -->
  <style>
    :root {
      color-scheme: light;
      --bg: #fff;
      --paper: #fff;
      --ink: #101214;
      --muted: #5d646b;
      --line: rgba(16, 18, 20, .18);
      --section-edge: rgba(0, 0, 0, .32);
      --grid-line: rgba(0, 0, 0, .24);
      --note-divider: rgba(0, 0, 0, .42);
      --header: rgba(255, 255, 255, .96);
      --control: #111;
      --control-ink: #fff;
      --band-ink: #fff;
      --melody: #fff;
      --melody-bubble: #c8102e;
      --intro: #334155;
      --verse: #1e4f91;
      --tag: #9a4d0d;
      --prechorus: #82650b;
      --chorus: #176b3a;
      --instrumental: #553c9a;
      --bridge: #8c3030;
      --ending: #3f4752;
    }

    body.dark-theme {
      color-scheme: dark;
      --bg: #090c10;
      --paper: #151a21;
      --ink: #f5f7fa;
      --muted: #aab2bd;
      --line: rgba(255, 255, 255, .14);
      --note-divider: rgba(0, 0, 0, .48);
      --header: rgba(14, 18, 24, .96);
      --control: #f5f7fa;
      --control-ink: #101214;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-variant-numeric: tabular-nums;
    }
    button { font: inherit; }

    .prototype-warning {
      padding: 7px 16px;
      background: #050505;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
    }

    .song-header {
      position: sticky;
      z-index: 5;
      top: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding: 14px max(12px, calc((100vw - 1180px) / 2));
      border-bottom: 1px solid var(--line);
      background: var(--header);
      backdrop-filter: blur(12px);
    }
    .song-header h1 { margin: 0; font-size: clamp(22px, 4vw, 36px); letter-spacing: -.04em; }
    .artist { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .header-tools { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .meta { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .meta span { padding: 6px 8px; border: 1px solid var(--line); border-radius: 999px; background: var(--paper); font-size: 12px; font-weight: 800; }
    .theme-toggle,
    .layout-toggle,
    .cell-style-toggle { width: 36px; height: 34px; display: inline-grid; padding: 0; border: 0; border-radius: 999px; background: var(--control); color: var(--control-ink); cursor: pointer; place-items: center; }
    .layout-toggle { display: none; }
    .control-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2; }
    .song-map { display: flex; flex: 1 0 100%; gap: 5px; padding-top: 6px; overflow-x: auto; scrollbar-width: thin; }
    .map-chip { display: inline-grid; width: 27px; height: 27px; flex: 0 0 27px; border: 1px solid rgba(0, 0, 0, .3); border-radius: 999px; background: var(--ending); color: #fff; font-size: 8px; font-weight: 900; place-items: center; text-decoration: none; }
    .map-chip[data-code="IN"] { background: var(--intro); }
    .map-chip[data-code="VS"] { background: var(--verse); }
    .map-chip[data-code="TG"] { background: var(--tag); }
    .map-chip[data-code="PC"] { background: var(--prechorus); }
    .map-chip[data-code="CH"] { background: var(--chorus); }
    .map-chip[data-code="IS"] { background: var(--instrumental); }
    .map-chip[data-code="BR"] { background: var(--bridge); }
    .map-chip:hover,
    .map-chip:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

    #chart { width: min(1180px, calc(100% - 20px)); margin: 14px auto 48px; }
    .chart-intro { margin: 0 0 12px; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .section { --section-color: var(--ending); color: var(--band-ink); }
    .section[data-code="IN"] { --section-color: var(--intro); }
    .section[data-code="VS"] { --section-color: var(--verse); }
    .section[data-code="TG"] { --section-color: var(--tag); }
    .section[data-code="PC"] { --section-color: var(--prechorus); }
    .section[data-code="CH"] { --section-color: var(--chorus); }
    .section[data-code="IS"] { --section-color: var(--instrumental); }
    .section[data-code="BR"] { --section-color: var(--bridge); }

    .section {
      display: inline-grid;
      width: 100%;
      margin: 0 0 12px;
      overflow: hidden;
      break-inside: avoid;
      border: 1px solid var(--section-edge);
      border-radius: 12px;
      background: var(--section-color);
      grid-template-columns: 42px minmax(0, 1fr);
      vertical-align: top;
      scroll-margin-top: 116px;
    }
    .section-heading { display: flex; min-width: 0; align-items: center; flex-direction: column; gap: 6px; justify-content: flex-start; padding: 7px 5px; }
    .section[data-row-count="1"] .section-heading { grid-row: 1; }
    .section[data-row-count="2"] .section-heading { grid-row: 1 / span 2; }
    .section-heading h2 { margin: auto 0; font-size: 13px; letter-spacing: .01em; line-height: 1; writing-mode: vertical-rl; transform: rotate(180deg); }
    .section-code { padding: 3px 6px; border: 1px solid rgba(0, 0, 0, .3); border-radius: 6px; font-size: 9px; font-weight: 900; }

    .chart-row { grid-column: 2; }

    .bars-and-notes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(80px, 1.15fr);
      min-width: 0;
    }
    .bar {
      display: grid;
      min-width: 0;
      min-height: 64px;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      padding: 6px 2px 5px;
    }
    .bar:first-child { border-left: 0; }
    .bar-chord { display: grid; min-width: 0; place-items: center; font-size: clamp(19px, 2.4vw, 28px); font-weight: 850; letter-spacing: -.04em; }
    .bar-melody { display: inline-flex; min-width: 0; max-width: calc(100% - 4px); min-height: 16px; align-items: center; justify-content: center; gap: 3px; color: var(--melody); font-size: clamp(7px, 1.05vw, 10px); font-weight: 900; line-height: 1.05; overflow-wrap: anywhere; text-align: center; }
    .bar-melody.has-melody { padding: 3px 6px; border-radius: 999px; background: var(--melody-bubble); box-shadow: 0 1px 2px rgba(0, 0, 0, .2); }
    .event { position: relative; display: inline-grid; min-width: 0; place-items: center; }
    .diamond { width: 29px; height: 29px; border: 2px solid currentColor; transform: rotate(45deg); }
    .diamond span { transform: rotate(-45deg); }
    .empty { color: transparent; }

    .row-notes {
      display: grid;
      min-width: 0;
      align-content: center;
      gap: 3px;
      padding: 6px 8px;
      border-left: 0;
      background: transparent;
      overflow: hidden;
      font-size: clamp(8px, 1.15vw, 11px);
      line-height: 1.15;
    }
    .direction { font-weight: 900; letter-spacing: .05em; text-transform: uppercase; }
    .no-note { opacity: 0; }
    .section[data-row-count="1"] .bar,
    .section[data-row-count="1"] .row-notes { min-height: 128px; }

    body.cell-grid .section-heading { border-right: 1px solid var(--grid-line); }
    body.cell-grid .chart-row + .chart-row { border-top: 1px solid var(--grid-line); }
    body.cell-grid .bar { border-right: 1px solid var(--grid-line); }

    body.cell-bubbles .section { padding: 6px; column-gap: 6px; }
    body.cell-bubbles .section-heading { padding: 1px 0; }
    body.cell-bubbles .chart-row + .chart-row { margin-top: 6px; }
    body.cell-bubbles .bars-and-notes { gap: 6px; }
    body.cell-bubbles .bar,
    body.cell-bubbles .row-notes { border: 0; border-radius: 9px; background: rgba(0, 0, 0, .1); }
    body.cell-bubbles .section[data-row-count="1"] .bar,
    body.cell-bubbles .section[data-row-count="1"] .row-notes { min-height: 134px; }

    @media (min-width: 700px) {
      #sections { column-count: 2; column-gap: 14px; }
      body.single-column #sections { column-count: 1; }
      .layout-toggle { display: inline-block; }
    }

    @media (max-width: 699px) {
      .song-header { align-items: start; padding: 10px 12px; }
      .artist { font-size: 12px; }
      .header-tools { max-width: 190px; flex-wrap: wrap; }
      .song-map { padding-top: 5px; }
      .map-chip { width: 25px; height: 25px; flex-basis: 25px; }
      .meta { gap: 4px; }
      .meta span { padding: 5px 7px; font-size: 10px; }
      .theme-toggle { width: 32px; height: 30px; }
      .cell-style-toggle { width: 32px; height: 30px; }
      #chart { width: calc(100% - 12px); margin-top: 8px; }
      .chart-intro { padding-inline: 4px; font-size: 10px; }
      .section { margin-bottom: 8px; border-radius: 9px; }
      .section { scroll-margin-top: 148px; }
      .section { grid-template-columns: 36px minmax(0, 1fr); }
      .section-heading { padding: 6px 4px; }
      .section-heading h2 { font-size: 12px; }
      body.cell-bubbles .section-heading { padding: 1px 0; }
      .bars-and-notes { grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(76px, 1.05fr); }
      .bar { min-height: 60px; }
      .section[data-row-count="1"] .bar,
      .section[data-row-count="1"] .row-notes { min-height: 120px; }
      body.cell-bubbles .section[data-row-count="1"] .bar,
      body.cell-bubbles .section[data-row-count="1"] .row-notes { min-height: 126px; }
      .bar-chord { font-size: 18px; }
      .bar-melody { font-size: 7px; }
      .row-notes { padding: 4px; font-size: 8px; }
    }
  </style>
</head>
<body class="dark-theme">
  <div class="prototype-warning">Throwaway prototype · chosen direction A · Section Bands</div>
  <header class="song-header">
    <div>
      <h1>Más</h1>
      <p class="artist">Miel San Marcos</p>
    </div>
    <div class="header-tools">
      <div class="meta" aria-label="Song metadata"><span>Key D</span><span>140 BPM</span><span>4/4</span></div>
      <button class="layout-toggle" type="button" id="layout-toggle" aria-pressed="false" aria-label="Layout: two columns" title="Two-column layout"></button>
      <button class="cell-style-toggle" type="button" id="cell-style-toggle" aria-label="Cell style: Grid" title="Grid cells"></button>
      <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Use light mode" title="Use light mode"></button>
    </div>
    <nav class="song-map" id="song-map" aria-label="Song map"></nav>
  </header>
  <main id="chart">
    <p class="chart-intro">Expanded Arrangement · vertical Section headers preserve chart height · compare Grid and softly filled Bar Bubble cells · Melody Fragments use borderless red capsules.</p>
    <div id="sections"></div>
  </main>

  <script>
    (function () {
      const melodyA = ["17 65", "32 12", "17 65", "5156 5"];
      const melodyB = ["6 3", "6 –", "6 3", "7 –"];
      const melodyC = ["656 3", "656 3", "656 3", "7"];
      const melodyD = ["265 61", "3323 1265", "265 61", "3323 3511"];
      const common = [["4", "2", "6", "3"], ["4", "2", "6", "3"]];
      const bridge = [["4", "5", "6", "1/3"], ["4", "5", "6", "1/3"]];
      const sections = [
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "octave", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, [{ type: "direction", text: "Rakes", row: 0 }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "octave", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, []], ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IS", "Instrumental", [["6", "6", "6", "6"], ["6", "6", "6", "6"]], [{ type: "melody", fragments: melodyD }, { type: "melody", fragments: melodyD }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["TG", "Tag", bridge, []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "octave", text: "Oct ↑", row: 1 }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["EN", "Ending", [["234", "671", { text: "3", diamond: true }, ""]], []]
      ].map(function (section) { return { code: section[0], name: section[1], rows: section[2], notes: section[3] }; });

      function rowNotes(section, rowIndex) {
        return section.notes.filter(function (note, noteIndex) {
          const targetRow = note.row === undefined ? noteIndex : note.row;
          return (note.type === "direction" || note.type === "octave") && targetRow === rowIndex;
        });
      }

      function melodyFor(section, rowIndex) {
        return section.notes.find(function (note, noteIndex) {
          const targetRow = note.row === undefined ? noteIndex : note.row;
          return note.type === "melody" && targetRow === rowIndex;
        });
      }

      function chord(value) {
        const event = typeof value === "object" ? value : { text: value };
        if (!event.text) return '<span class="event empty">—</span>';
        if (event.diamond) return '<span class="event diamond"><span>' + event.text + '</span></span>';
        return '<span class="event">' + event.text + '</span>';
      }

      function renderBar(value, melody) {
        return '<div class="bar"><div class="bar-chord">' + chord(value) + '</div><div class="bar-melody ' + (melody ? 'has-melody' : '') + '">' + (melody || '&nbsp;') + '</div></div>';
      }

      function renderSection(section, sectionIndex) {
        const rows = section.rows.map(function (bars, rowIndex) {
          const melody = melodyFor(section, rowIndex);
          const directions = rowNotes(section, rowIndex);
          const notes = directions.length ? directions.map(function (note) { return '<span class="direction">' + note.text + '</span>'; }).join('') : '<span class="no-note">None</span>';
          return '<div class="chart-row"><div class="bars-and-notes">' + bars.map(function (bar, barIndex) {
            return renderBar(bar, melody ? melody.fragments[barIndex] : '');
          }).join('') + '<aside class="row-notes" aria-label="Row notes">' + notes + '</aside></div></div>';
        }).join('');
        return '<section class="section" id="section-' + sectionIndex + '" data-code="' + section.code + '" data-row-count="' + section.rows.length + '"><header class="section-heading"><h2>' + section.name + '</h2><span class="section-code">' + section.code + '</span></header>' + rows + '</section>';
      }

      function applyTheme(theme) {
        const dark = theme !== 'light';
        document.body.classList.toggle('dark-theme', dark);
        const button = document.getElementById('theme-toggle');
        button.innerHTML = dark
          ? '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>'
          : '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.2A8 8 0 0 1 8.8 4 8.1 8.1 0 1 0 20 15.2Z"></path></svg>';
        const label = dark ? 'Use light mode' : 'Use dark mode';
        button.setAttribute('aria-label', label);
        button.setAttribute('title', label);
        const url = new URL(location.href);
        url.searchParams.set('theme', dark ? 'dark' : 'light');
        history.replaceState({}, '', url);
      }

      function applyColumns(columns) {
        const single = columns === '1';
        document.body.classList.toggle('single-column', single);
        const button = document.getElementById('layout-toggle');
        button.innerHTML = single
          ? '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"></rect></svg>'
          : '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M12 4v16"></path></svg>';
        button.setAttribute('aria-pressed', String(single));
        const label = single ? 'Layout: one column' : 'Layout: two columns';
        button.setAttribute('aria-label', label);
        button.setAttribute('title', label);
        const url = new URL(location.href);
        url.searchParams.set('columns', single ? '1' : '2');
        history.replaceState({}, '', url);
      }

      function applyCellStyle(style) {
        const bubbles = style === 'bubbles';
        document.body.classList.toggle('cell-grid', !bubbles);
        document.body.classList.toggle('cell-bubbles', bubbles);
        const button = document.getElementById('cell-style-toggle');
        button.innerHTML = bubbles
          ? '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="7" width="4" height="10" rx="2"></rect><rect x="7.3" y="7" width="4" height="10" rx="2"></rect><rect x="12.7" y="7" width="4" height="10" rx="2"></rect><rect x="18" y="7" width="4" height="10" rx="2"></rect></svg>'
          : '<svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M7.5 5v14M12 5v14M16.5 5v14"></path></svg>';
        const label = bubbles ? 'Cell style: Bar bubbles' : 'Cell style: Grid';
        button.setAttribute('aria-label', label);
        button.setAttribute('title', label);
        const url = new URL(location.href);
        url.searchParams.set('cells', bubbles ? 'bubbles' : 'grid');
        history.replaceState({}, '', url);
      }

      document.getElementById('sections').innerHTML = sections.map(renderSection).join('');
      document.getElementById('song-map').innerHTML = sections.map(function (section, sectionIndex) {
        return '<a class="map-chip" data-code="' + section.code + '" href="#section-' + sectionIndex + '" aria-label="Go to ' + section.name + ', position ' + (sectionIndex + 1) + '">' + section.code + '</a>';
      }).join('');
      document.getElementById('theme-toggle').addEventListener('click', function () {
        applyTheme(document.body.classList.contains('dark-theme') ? 'light' : 'dark');
      });
      document.getElementById('layout-toggle').addEventListener('click', function () {
        applyColumns(document.body.classList.contains('single-column') ? '2' : '1');
      });
      document.getElementById('cell-style-toggle').addEventListener('click', function () {
        applyCellStyle(document.body.classList.contains('cell-bubbles') ? 'grid' : 'bubbles');
      });
      const searchParams = new URLSearchParams(location.search);
      applyTheme(searchParams.get('theme') || 'dark');
      applyColumns(searchParams.get('columns') || '2');
      applyCellStyle(searchParams.get('cells') || 'grid');
    })();
  </script>
</body>
</html>
