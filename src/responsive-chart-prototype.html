<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Bands Prototype — Setlist Viewer</title>
  <!-- Throwaway refinement of the chosen Section Bands direction. -->
  <style>
    :root {
      color-scheme: light;
      --bg: #edf0f2;
      --paper: #fff;
      --ink: #101214;
      --muted: #5d646b;
      --line: rgba(16, 18, 20, .24);
      --soft-line: rgba(16, 18, 20, .14);
      --header: rgba(255, 255, 255, .96);
      --control: #111;
      --control-ink: #fff;
      --band-ink: #101214;
      --melody: #9f1239;
      --intro: #cbd5e1;
      --verse: #93c5fd;
      --tag: #fdba74;
      --prechorus: #fde68a;
      --chorus: #86efac;
      --instrumental: #c4b5fd;
      --bridge: #fca5a5;
      --ending: #d1d5db;
    }

    body.dark-theme {
      color-scheme: dark;
      --bg: #090c10;
      --paper: #151a21;
      --ink: #f5f7fa;
      --muted: #aab2bd;
      --line: rgba(255, 255, 255, .3);
      --soft-line: rgba(255, 255, 255, .17);
      --header: rgba(14, 18, 24, .96);
      --control: #f5f7fa;
      --control-ink: #101214;
      --band-ink: #fff;
      --melody: #ffe4e6;
      --intro: #334155;
      --verse: #1e4f91;
      --tag: #9a4d0d;
      --prechorus: #82650b;
      --chorus: #176b3a;
      --instrumental: #553c9a;
      --bridge: #8c3030;
      --ending: #3f4752;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-variant-numeric: tabular-nums;
    }
    button { font: inherit; }

    .prototype-warning {
      padding: 7px 16px;
      background: #050505;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
    }

    .song-header {
      position: sticky;
      z-index: 5;
      top: 0;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding: 14px max(12px, calc((100vw - 1180px) / 2));
      border-bottom: 1px solid var(--line);
      background: var(--header);
      backdrop-filter: blur(12px);
    }
    .song-header h1 { margin: 0; font-size: clamp(22px, 4vw, 36px); letter-spacing: -.04em; }
    .artist { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .header-tools { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .meta { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .meta span { padding: 6px 8px; border: 1px solid var(--line); border-radius: 999px; background: var(--paper); font-size: 12px; font-weight: 800; }
    .theme-toggle { padding: 7px 10px; border: 0; border-radius: 999px; background: var(--control); color: var(--control-ink); cursor: pointer; font-size: 12px; font-weight: 900; }

    #chart { width: min(1180px, calc(100% - 20px)); margin: 14px auto 48px; }
    .chart-intro { margin: 0 0 12px; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .section { --section-color: var(--ending); color: var(--band-ink); }
    .section[data-code="IN"] { --section-color: var(--intro); }
    .section[data-code="VS"] { --section-color: var(--verse); }
    .section[data-code="TG"] { --section-color: var(--tag); }
    .section[data-code="PC"] { --section-color: var(--prechorus); }
    .section[data-code="CH"] { --section-color: var(--chorus); }
    .section[data-code="IS"] { --section-color: var(--instrumental); }
    .section[data-code="BR"] { --section-color: var(--bridge); }

    .section {
      display: inline-block;
      width: 100%;
      margin: 0 0 12px;
      overflow: hidden;
      break-inside: avoid;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--section-color);
      vertical-align: top;
    }
    .section-heading { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid var(--line); }
    .section-heading h2 { margin: 0; font-size: 14px; }
    .section-code { padding: 3px 6px; border: 1px solid currentColor; border-radius: 6px; font-size: 9px; font-weight: 900; opacity: .8; }
    .chart-row + .chart-row { border-top: 1px solid var(--soft-line); }

    .bars-and-notes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(80px, 1.15fr);
      min-width: 0;
    }
    .bar {
      display: grid;
      min-width: 0;
      min-height: 64px;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      padding: 6px 2px 5px;
      border-right: 1px solid var(--line);
    }
    .bar:first-child { border-left: 1px solid var(--line); }
    .bar-chord { display: grid; min-width: 0; place-items: center; font-size: clamp(19px, 2.4vw, 28px); font-weight: 850; letter-spacing: -.04em; }
    .bar-melody { min-width: 0; max-width: 100%; min-height: 12px; color: var(--melody); font-size: clamp(7px, 1.05vw, 10px); font-weight: 850; line-height: 1.05; overflow-wrap: anywhere; text-align: center; }
    .event { position: relative; display: inline-grid; min-width: 0; place-items: center; }
    .diamond { width: 29px; height: 29px; border: 2px solid currentColor; transform: rotate(45deg); }
    .diamond span { transform: rotate(-45deg); }
    .empty { color: transparent; }

    .row-notes {
      display: grid;
      min-width: 0;
      align-content: center;
      gap: 3px;
      padding: 6px 8px;
      border-left: 1px solid var(--line);
      background: rgba(255, 255, 255, .1);
      overflow: hidden;
      font-size: clamp(8px, 1.15vw, 11px);
      line-height: 1.15;
    }
    .direction { font-weight: 900; letter-spacing: .05em; text-transform: uppercase; }
    .no-note { opacity: 0; }

    @media (min-width: 700px) {
      #sections { column-count: 2; column-gap: 14px; }
    }

    @media (max-width: 699px) {
      .song-header { align-items: start; padding: 10px 12px; }
      .artist { font-size: 12px; }
      .header-tools { max-width: 190px; flex-wrap: wrap; }
      .meta { gap: 4px; }
      .meta span { padding: 5px 7px; font-size: 10px; }
      .theme-toggle { padding: 6px 9px; font-size: 10px; }
      #chart { width: calc(100% - 12px); margin-top: 8px; }
      .chart-intro { padding-inline: 4px; font-size: 10px; }
      .section { margin-bottom: 8px; border-radius: 9px; }
      .section-heading { padding: 6px 8px; }
      .bars-and-notes { grid-template-columns: repeat(4, minmax(0, 1fr)) minmax(76px, 1.05fr); }
      .bar { min-height: 60px; }
      .bar-chord { font-size: 18px; }
      .bar-melody { font-size: 7px; }
      .row-notes { padding: 4px; font-size: 8px; }
    }
  </style>
</head>
<body class="dark-theme">
  <div class="prototype-warning">Throwaway prototype · chosen direction A · Section Bands</div>
  <header class="song-header">
    <div>
      <h1>Más</h1>
      <p class="artist">Miel San Marcos</p>
    </div>
    <div class="header-tools">
      <div class="meta" aria-label="Song metadata"><span>Key D</span><span>140 BPM</span><span>4/4</span></div>
      <button class="theme-toggle" type="button" id="theme-toggle">Light mode</button>
    </div>
  </header>
  <main id="chart">
    <p class="chart-intro">Expanded Arrangement · read down the left column, then down the right · Melody Fragments sit inside their Bars · Row Notes remain available for Performance Directions.</p>
    <div id="sections"></div>
  </main>

  <script>
    (function () {
      const melodyA = ["17 65", "32 12", "17 65", "5156 5"];
      const melodyB = ["6 3", "6 –", "6 3", "7 –"];
      const melodyC = ["656 3", "656 3", "656 3", "7"];
      const melodyD = ["265 61", "3323 1265", "265 61", "3323 3511"];
      const common = [["4", "2", "6", "3"], ["4", "2", "6", "3"]];
      const bridge = [["4", "5", "6", "1/3"], ["4", "5", "6", "1/3"]];
      const sections = [
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, [{ type: "direction", text: "Rakes", row: 0 }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["TG", "Tag", [["3", "", "", ""]], []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IN", "Intro", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["VS", "Verse", common, []], ["TG", "Tag", [["3", "", "", ""]], []],
        ["PC", "Pre-Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyB }, { type: "melody", fragments: melodyB }]],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyC }, { type: "melody", fragments: melodyC }]],
        ["IS", "Instrumental", [["6", "6", "6", "6"], ["6", "6", "6", "6"]], [{ type: "melody", fragments: melodyD }, { type: "melody", fragments: melodyD }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["TG", "Tag", bridge, []],
        ["CH", "Chorus", common, [{ type: "melody", fragments: melodyA }, { type: "melody", fragments: melodyA }, { type: "direction", text: "Oct ↑", row: 1 }]],
        ["BR", "Bridge", bridge, []], ["BR", "Bridge", bridge, []],
        ["EN", "Ending", [["234", "671", { text: "3", diamond: true }, ""]], []]
      ].map(function (section) { return { code: section[0], name: section[1], rows: section[2], notes: section[3] }; });

      function rowNotes(section, rowIndex) {
        return section.notes.filter(function (note, noteIndex) {
          const targetRow = note.row === undefined ? noteIndex : note.row;
          return note.type === "direction" && targetRow === rowIndex;
        });
      }

      function melodyFor(section, rowIndex) {
        return section.notes.find(function (note, noteIndex) {
          const targetRow = note.row === undefined ? noteIndex : note.row;
          return note.type === "melody" && targetRow === rowIndex;
        });
      }

      function chord(value) {
        const event = typeof value === "object" ? value : { text: value };
        if (!event.text) return '<span class="event empty">—</span>';
        if (event.diamond) return '<span class="event diamond"><span>' + event.text + '</span></span>';
        return '<span class="event">' + event.text + '</span>';
      }

      function renderBar(value, melody) {
        return '<div class="bar"><div class="bar-chord">' + chord(value) + '</div><div class="bar-melody">' + (melody || '&nbsp;') + '</div></div>';
      }

      function renderSection(section) {
        const rows = section.rows.map(function (bars, rowIndex) {
          const melody = melodyFor(section, rowIndex);
          const directions = rowNotes(section, rowIndex);
          const notes = directions.length ? directions.map(function (note) { return '<span class="direction">' + note.text + '</span>'; }).join('') : '<span class="no-note">None</span>';
          return '<div class="chart-row"><div class="bars-and-notes">' + bars.map(function (bar, barIndex) {
            return renderBar(bar, melody ? melody.fragments[barIndex] : '');
          }).join('') + '<aside class="row-notes" aria-label="Row notes">' + notes + '</aside></div></div>';
        }).join('');
        return '<section class="section" data-code="' + section.code + '"><header class="section-heading"><h2>' + section.name + '</h2><span class="section-code">' + section.code + '</span></header>' + rows + '</section>';
      }

      function applyTheme(theme) {
        const dark = theme !== 'light';
        document.body.classList.toggle('dark-theme', dark);
        document.getElementById('theme-toggle').textContent = dark ? 'Light mode' : 'Dark mode';
        const url = new URL(location.href);
        url.searchParams.set('theme', dark ? 'dark' : 'light');
        history.replaceState({}, '', url);
      }

      document.getElementById('sections').innerHTML = sections.map(renderSection).join('');
      document.getElementById('theme-toggle').addEventListener('click', function () {
        applyTheme(document.body.classList.contains('dark-theme') ? 'light' : 'dark');
      });
      applyTheme(new URLSearchParams(location.search).get('theme') || 'dark');
    })();
  </script>
</body>
</html>
